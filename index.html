<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Churn Station – Premium Ice Cream & Desserts</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,600;1,700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --ice:#EBF5FB; --ice2:#D6EEF8; --ice3:#C0E2F5; --ice4:#F4FAFD;
  --blue:#1A73A7; --blue2:#155E8C; --blue3:#0D4266; --blue4:#072B45;
  --sky:#5BAFD6; --skylt:#A8D8EF;
  --white:#FFFFFF; --pale:#F4FAFD;
  --txt:#0A2233; --muted:#4A7A96; --mutedlt:#7BAEC5;
  --border:rgba(26,115,167,0.13); --border2:rgba(26,115,167,0.26);
  --shadow:0 8px 40px rgba(13,66,102,0.10);
  --shadow2:0 20px 60px rgba(13,66,102,0.18);
  --green:#27AE60; --red:#E74C3C; --gold:#C8951A;
  --wa:#25D366;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;background:var(--ice4);color:var(--txt);overflow-x:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--ice)}
::-webkit-scrollbar-thumb{background:var(--sky);border-radius:10px}

/* ══ LOCATION MODAL ══ */
#loc-modal{
  position:fixed;inset:0;z-index:5000;
  background:linear-gradient(145deg,var(--blue4) 0%,var(--blue3) 50%,var(--blue2) 100%);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.lm-box{
  background:#fff;border-radius:28px;padding:40px 32px 36px;
  max-width:480px;width:100%;text-align:center;
  box-shadow:0 40px 100px rgba(0,0,0,.35);
  animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes popIn{from{opacity:0;transform:scale(.88) translateY(20px)}to{opacity:1;transform:none}}
.lm-logo{font-family:'Cormorant Garamond',serif;font-size:2.2rem;font-weight:700;color:var(--blue3)}
.lm-logo em{color:var(--blue);font-style:italic}
.lm-tag{font-size:.65rem;letter-spacing:3.5px;text-transform:uppercase;color:var(--sky);font-weight:600;margin-bottom:28px;margin-top:3px}
.lm-step-h{font-size:.88rem;font-weight:700;color:var(--txt);margin-bottom:6px}
.lm-step-p{font-size:.75rem;color:var(--muted);margin-bottom:20px}

/* ORDER TYPE STEP */
.lm-type-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:4px}
.lm-type-btn{
  border:2px solid var(--border2);border-radius:16px;
  padding:24px 12px 18px;cursor:pointer;background:var(--pale);
  font-family:'DM Sans',sans-serif;transition:all .3s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:hidden;
}
.lm-type-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  opacity:0;transition:opacity .25s;
}
.lm-type-btn:hover::after,.lm-type-btn.sel::after{opacity:1}
.lm-type-btn:hover,.lm-type-btn.sel{border-color:var(--blue);transform:translateY(-3px);box-shadow:0 10px 28px rgba(26,115,167,.25)}
.lm-type-icon{font-size:2rem;display:block;margin-bottom:8px;position:relative;z-index:1}
.lm-type-name{font-size:.9rem;font-weight:700;color:var(--txt);display:block;position:relative;z-index:1;transition:color .25s}
.lm-type-desc{font-size:.7rem;color:var(--muted);display:block;margin-top:3px;position:relative;z-index:1;transition:color .25s}
.lm-type-btn:hover .lm-type-name,.lm-type-btn.sel .lm-type-name,
.lm-type-btn:hover .lm-type-desc,.lm-type-btn.sel .lm-type-desc{color:#fff}

/* BRANCH STEP */
.lm-branches{display:flex;flex-direction:column;gap:10px}
.lm-branch-btn{
  border:1.5px solid var(--border2);border-radius:14px;
  padding:14px 18px;cursor:pointer;background:var(--pale);
  font-family:'DM Sans',sans-serif;transition:all .25s;
  display:flex;align-items:center;gap:14px;text-align:left;
}
.lm-branch-btn:hover,.lm-branch-btn.sel{background:var(--blue);border-color:var(--blue);transform:translateX(4px)}
.lm-branch-btn:hover *,.lm-branch-btn.sel *{color:#fff !important}
.lm-branch-icon{font-size:1.4rem;flex-shrink:0}
.lm-branch-name{font-size:.88rem;font-weight:700;color:var(--txt)}
.lm-branch-area{font-size:.72rem;color:var(--muted);margin-top:1px}
.lm-branch-hours{font-size:.68rem;color:var(--sky);margin-top:3px}

/* USER LOC STEP */
.lm-userloc-btn{
  display:flex;align-items:center;gap:10px;justify-content:center;
  width:100%;padding:13px;border:1.5px solid var(--border2);border-radius:12px;
  background:var(--pale);cursor:pointer;font-family:'DM Sans',sans-serif;
  font-size:.83rem;font-weight:600;color:var(--blue);transition:all .25s;margin-bottom:10px;
}
.lm-userloc-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.lm-userloc-status{font-size:.75rem;color:var(--muted);min-height:20px;text-align:center;margin-bottom:12px}

.lm-back{background:none;border:none;font-size:.78rem;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:14px;font-weight:600}
.lm-back:hover{color:var(--blue)}
.lm-confirm-btn{
  width:100%;background:linear-gradient(135deg,var(--blue),var(--blue2));
  color:#fff;border:none;padding:14px;border-radius:12px;
  font-size:.9rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .25s;box-shadow:0 4px 18px rgba(26,115,167,.35);margin-top:14px;
  display:none;
}
.lm-confirm-btn:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(26,115,167,.45)}
.lm-confirm-btn.show{display:block}

/* ══ ORDER MODAL (Delivery / Pickup options) ══ */
#order-modal{
  position:fixed;inset:0;z-index:4500;
  background:rgba(7,43,69,.6);backdrop-filter:blur(12px);
  display:none;align-items:center;justify-content:center;padding:20px;
}
#order-modal.open{display:flex}
.om-box{
  background:#fff;border-radius:28px;padding:36px 28px 32px;
  max-width:420px;width:100%;position:relative;
  animation:popIn .4s cubic-bezier(.34,1.56,.64,1) both;
}
.om-close{
  position:absolute;top:14px;right:16px;
  background:var(--ice);border:none;width:32px;height:32px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;
  cursor:pointer;font-size:.9rem;color:var(--muted);transition:all .2s;
}
.om-close:hover{background:var(--red);color:#fff}
.om-title{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;color:var(--blue3);margin-bottom:4px}
.om-sub{font-size:.78rem;color:var(--muted);margin-bottom:24px}
.om-options{display:flex;flex-direction:column;gap:12px}
.om-option{
  display:flex;align-items:center;gap:14px;
  padding:16px 18px;border:1.5px solid var(--border2);border-radius:16px;
  cursor:pointer;transition:all .25s;text-align:left;background:var(--pale);
  text-decoration:none;font-family:'DM Sans',sans-serif;
}
.om-option:hover{border-color:var(--blue);background:var(--ice);transform:translateX(4px)}
.om-option-icon{font-size:1.8rem;flex-shrink:0}
.om-option-name{font-size:.9rem;font-weight:700;color:var(--txt)}
.om-option-desc{font-size:.72rem;color:var(--muted);margin-top:2px}
.om-option.wa .om-option-name{color:var(--wa)}
.om-option.call .om-option-name{color:var(--blue)}

/* ══ CART SIDEBAR ══ */
.cart-overlay{position:fixed;inset:0;background:rgba(7,43,69,.5);z-index:3200;display:none;backdrop-filter:blur(4px)}
.cart-overlay.open{display:block}
#cart-sidebar{
  position:fixed;right:0;top:0;height:100%;width:390px;max-width:100%;
  background:#fff;z-index:3300;
  transform:translateX(100%);transition:transform .38s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
  border-left:1px solid var(--border);box-shadow:-10px 0 60px rgba(13,66,102,.15);
}
#cart-sidebar.open{transform:none}
.cart-head{
  padding:22px 22px 18px;
  background:linear-gradient(135deg,var(--blue3),var(--blue2));
  display:flex;justify-content:space-between;align-items:center;
}
.cart-head h3{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:#fff;letter-spacing:.5px}
.cart-close{background:rgba(255,255,255,.15);border:none;width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:.95rem;display:flex;align-items:center;justify-content:center;color:#fff;transition:all .2s}
.cart-close:hover{background:rgba(255,255,255,.3)}
.cart-info-bar{padding:8px 18px;background:var(--ice);font-size:.72rem;color:var(--blue);font-weight:600;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.cart-info-tag{background:var(--blue);color:#fff;font-size:.62rem;padding:2px 8px;border-radius:20px;font-weight:700;margin-left:4px}
.cart-items{flex:1;overflow-y:auto;padding:14px 18px}
.cart-empty{text-align:center;padding:50px 20px;color:var(--muted)}
.cart-empty-icon{font-size:3.2rem;display:block;margin-bottom:12px;opacity:.5}
.cart-empty p{font-size:.82rem;line-height:1.7}
.ci{display:flex;align-items:flex-start;gap:12px;padding:13px 0;border-bottom:1px solid var(--border)}
.ci:last-child{border-bottom:none}
.ci-icon{width:48px;height:48px;background:var(--ice);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0;border:1px solid var(--border2)}
.ci-info{flex:1}
.ci-name{font-size:.85rem;font-weight:700;color:var(--txt)}
.ci-price{font-size:.78rem;color:var(--blue);font-weight:600;margin-top:2px}
.ci-qty{display:flex;align-items:center;gap:8px;margin-top:8px}
.qty-btn{width:28px;height:28px;border-radius:7px;border:1.5px solid var(--border2);background:#fff;font-size:1rem;cursor:pointer;font-weight:700;color:var(--blue);display:flex;align-items:center;justify-content:center;transition:all .2s;line-height:1;font-family:'DM Sans',sans-serif}
.qty-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.qty-num{font-size:.85rem;font-weight:700;color:var(--txt);min-width:22px;text-align:center}
.ci-del{background:none;border:none;color:#ccc;cursor:pointer;font-size:.85rem;padding:4px;transition:color .2s;margin-left:auto}
.ci-del:hover{color:var(--red)}
.cart-foot{padding:18px 22px;border-top:1px solid var(--border);background:var(--pale)}
.cart-total{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
.cart-total-label{font-size:.8rem;font-weight:600;color:var(--muted)}
.cart-total-val{font-family:'Cormorant Garamond',serif;font-size:1.7rem;font-weight:700;color:var(--blue3)}
.cart-order-btn{
  display:flex;width:100%;background:linear-gradient(135deg,var(--blue),var(--blue2));
  color:#fff;border:none;padding:14px 18px;border-radius:14px;
  font-size:.88rem;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;
  align-items:center;justify-content:center;gap:8px;
  box-shadow:0 4px 18px rgba(26,115,167,.35);transition:all .25s;letter-spacing:.3px;
}
.cart-order-btn:hover{transform:translateY(-2px);box-shadow:0 8px 26px rgba(26,115,167,.45)}

/* ══ NAV ══ */
nav{
  position:fixed;top:0;width:100%;z-index:3000;
  background:rgba(244,250,253,.96);backdrop-filter:blur(22px) saturate(180%);
  border-bottom:1px solid var(--border);height:66px;
  display:flex;align-items:center;padding:0 26px;gap:12px;
  box-shadow:0 2px 20px rgba(13,66,102,.06);transition:all .3s;
}
nav.scrolled{height:58px;box-shadow:0 4px 30px rgba(13,66,102,.1)}
.nav-logo{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;color:var(--blue3);flex:1;letter-spacing:.5px;cursor:pointer}
.nav-logo em{color:var(--blue);font-style:italic}
.nav-links{display:flex;gap:4px;align-items:center}
.nav-link{padding:7px 14px;border-radius:50px;font-size:.78rem;font-weight:600;color:var(--muted);cursor:pointer;transition:all .2s;text-decoration:none}
.nav-link:hover{background:var(--ice);color:var(--blue)}
.nav-pill{
  display:flex;align-items:center;gap:6px;background:var(--ice);
  border:1.5px solid var(--border2);padding:7px 14px;border-radius:50px;
  cursor:pointer;font-size:.75rem;font-weight:700;color:var(--blue);
  transition:all .2s;white-space:nowrap;font-family:'DM Sans',sans-serif;max-width:170px;
}
.nav-pill span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-pill:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.nav-cart-btn{
  position:relative;background:var(--blue3);color:#fff;border:none;
  width:42px;height:42px;border-radius:12px;cursor:pointer;font-size:1.05rem;
  display:flex;align-items:center;justify-content:center;transition:all .25s;
  box-shadow:0 3px 12px rgba(13,66,102,.22);
}
.nav-cart-btn:hover{background:var(--blue)}
.cart-badge{
  position:absolute;top:-7px;right:-7px;background:var(--red);color:#fff;
  font-size:.6rem;font-weight:800;width:20px;height:20px;border-radius:50%;
  display:none;align-items:center;justify-content:center;border:2px solid #fff;
}

/* ══ HERO ══ */
.hero{
  min-height:100vh;
  background:linear-gradient(160deg,#C8E9F5 0%,#E8F5FC 40%,#D4EDF9 70%,#C0E2F5 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:110px 24px 80px;position:relative;overflow:hidden;
}
.hero-dots{
  position:absolute;inset:0;pointer-events:none;
  background-image:radial-gradient(rgba(26,115,167,.08) 1.5px,transparent 1.5px);
  background-size:36px 36px;
}
.hero-circle1{position:absolute;width:650px;height:650px;border-radius:50%;background:radial-gradient(rgba(91,175,214,.12),transparent 70%);top:-180px;right:-160px;pointer-events:none}
.hero-circle2{position:absolute;width:480px;height:480px;border-radius:50%;background:radial-gradient(rgba(26,115,167,.08),transparent 70%);bottom:-80px;left:-80px;pointer-events:none}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  background:#fff;border:1.5px solid var(--border2);padding:8px 20px;
  border-radius:50px;font-size:.7rem;font-weight:700;color:var(--blue);
  box-shadow:0 4px 20px rgba(26,115,167,.1);margin-bottom:22px;
  letter-spacing:2px;text-transform:uppercase;animation:up .8s .1s both;
}
.hero-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.5);opacity:.6}}
.hero h1{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(2.8rem,8vw,5.5rem);font-weight:700;line-height:1.05;color:var(--txt);
  animation:up .8s .2s both;
}
.hero h1 em{color:var(--blue);font-style:italic}
.hero-sub{margin-top:16px;font-size:.95rem;color:var(--muted);max-width:440px;line-height:1.8;font-weight:400;animation:up .8s .3s both}
.hero-actions{margin-top:34px;display:flex;gap:12px;flex-wrap:wrap;justify-content:center;animation:up .8s .4s both}
.btn-primary{
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  color:#fff;padding:14px 32px;border-radius:50px;border:none;
  font-size:.88rem;font-weight:700;cursor:pointer;text-decoration:none;
  transition:all .3s;font-family:'DM Sans',sans-serif;
  box-shadow:0 6px 22px rgba(26,115,167,.38);display:inline-flex;align-items:center;gap:8px;
}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 10px 30px rgba(26,115,167,.48)}
.btn-outline{
  background:transparent;color:var(--blue3);padding:14px 32px;
  border-radius:50px;border:2px solid var(--blue3);font-size:.88rem;font-weight:700;
  cursor:pointer;text-decoration:none;transition:all .3s;font-family:'DM Sans',sans-serif;
}
.btn-outline:hover{background:var(--blue3);color:#fff;transform:translateY(-2px)}
.hero-stats{
  display:flex;margin-top:50px;flex-wrap:wrap;justify-content:center;
  background:#fff;border:1px solid var(--border2);border-radius:20px;
  box-shadow:0 8px 32px rgba(13,66,102,.1);animation:up .8s .6s both;overflow:hidden;
}
.stat{text-align:center;padding:20px 32px;border-right:1px solid var(--border)}
.stat:last-child{border-right:none}
.stat-n{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:var(--blue);display:block;line-height:1}
.stat-l{font-size:.65rem;font-weight:600;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:5px;display:block}
@keyframes up{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:none}}

/* ══ HOURS BAR ══ */
.hours-bar{
  background:var(--blue3);padding:14px 28px;
  display:flex;align-items:center;justify-content:center;gap:28px;flex-wrap:wrap;
}
.hb-item{display:flex;align-items:center;gap:8px;font-size:.75rem;color:rgba(255,255,255,.75);font-weight:500;letter-spacing:.5px}
.hb-item strong{color:#fff;font-weight:700}
.hb-sep{color:rgba(255,255,255,.25)}

/* ══ SECTION COMMON ══ */
.section{padding:80px 24px;max-width:1040px;margin:0 auto}
.sec-eyebrow{font-size:.68rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--sky);margin-bottom:8px}
.sec-title{font-family:'Cormorant Garamond',serif;font-size:clamp(1.9rem,4.5vw,2.8rem);font-weight:700;color:var(--txt);line-height:1.1}
.sec-title em{color:var(--blue);font-style:italic}
.sec-sub{font-size:.86rem;color:var(--muted);margin-top:10px;max-width:480px;line-height:1.75}

/* ══ FEATURED SECTION ══ */
.feat-section{padding:80px 24px;background:#fff}
.feat-inner{max-width:1040px;margin:0 auto}
.feat-scroll{display:flex;gap:18px;overflow-x:auto;padding:34px 0 14px;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.feat-scroll::-webkit-scrollbar{display:none}
.feat-card{
  flex-shrink:0;width:200px;background:var(--pale);
  border:1px solid var(--border);border-radius:20px;overflow:hidden;
  cursor:pointer;transition:all .3s;position:relative;
}
.feat-card:hover{transform:translateY(-7px);box-shadow:var(--shadow2);border-color:var(--border2)}
.feat-img{width:100%;height:150px;display:flex;align-items:center;justify-content:center;font-size:4rem;background:linear-gradient(135deg,var(--ice),var(--ice2))}
.feat-body{padding:14px}
.feat-name{font-size:.85rem;font-weight:700;color:var(--txt)}
.feat-price{font-size:.82rem;color:var(--blue);font-weight:700;margin-top:5px}
.feat-badge{position:absolute;top:10px;left:10px;background:var(--gold);color:#fff;font-size:.6rem;font-weight:800;padding:3px 9px;border-radius:50px;letter-spacing:.5px;text-transform:uppercase}
.feat-add{
  position:absolute;bottom:14px;right:14px;
  background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border:none;
  width:32px;height:32px;border-radius:9px;font-size:1.2rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .25s;
  box-shadow:0 3px 10px rgba(26,115,167,.32);
}
.feat-add:hover{transform:scale(1.15)}

/* ══ MENU SECTION ══ */
.menu-section{padding:80px 24px;background:var(--pale)}
.menu-inner{max-width:1040px;margin:0 auto}
.cat-nav{
  display:flex;gap:0;overflow-x:auto;scrollbar-width:none;
  border-bottom:2px solid var(--border2);margin:34px 0 0;
  -webkit-overflow-scrolling:touch;
}
.cat-nav::-webkit-scrollbar{display:none}
.cat-tab{
  flex-shrink:0;padding:12px 20px;font-size:.72rem;font-weight:600;
  letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);
  cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;
  transition:all .25s;font-family:'DM Sans',sans-serif;
  background:transparent;border-top:none;border-left:none;border-right:none;
  white-space:nowrap;display:flex;align-items:center;gap:6px;
}
.cat-tab:hover{color:var(--blue)}
.cat-tab.active{color:var(--blue);border-bottom-color:var(--blue);background:rgba(26,115,167,.04)}

/* Menu panels */
.cat-panel{display:none;margin-top:30px;animation:fadeUp .35s ease both}
.cat-panel.active{display:block}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}

.menu-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px}
.menu-card{
  background:#fff;border:1px solid var(--border);border-radius:18px;
  padding:16px;display:flex;align-items:center;gap:14px;
  cursor:pointer;transition:all .3s;position:relative;overflow:hidden;
}
